<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>模拟DNA分子重组</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="left-panel">
            <div class="panel-header header-flex">
                <div>
                    <h2 id="step-title">交互操作区 - 步骤 1：圆环切割</h2>
                    <p id="status-text">请在下方序列上点击（-）连字符位置选择切割位点（红线）</p>
                </div>
                <div id="mode-badge">当前模式: 活动1.a</div>
            </div>
            
            <div class="sequence-inputs">
                <div class="input-row">
                    <label>上链:</label>
                    <input type="text" id="input-top-seq" placeholder="输入基因序列 (如: ATCGeneATCG)..." />
                </div>
                <div class="input-row">
                    <label>下链:</label>
                    <input type="text" id="input-bot-seq" placeholder="输入基因序列..." />
                </div>
                <div class="action-row">
                    <span id="input-step-label">当前：载体序列</span>
                    <div class="btn-group">
                        <button id="btn-act1a" class="btn success">活动1.a</button>
                        <button id="btn-act1b" class="btn success">活动1.b</button>
                        <button id="btn-act2" class="btn success">活动2</button>
                        <button id="btn-reset-seq" class="btn secondary">恢复</button>
                        <button id="btn-apply-seq" class="btn primary">应用</button>
                    </div>
                </div>
            </div>

            <div id="selector-container">
                <canvas id="circularCanvas" width="700" height="500"></canvas>
                <canvas id="linearCanvas" width="700" height="500" style="display:none;"></canvas>
            </div>
            <div class="control-bar">
                <button id="btn-cut" class="btn primary full-width-mobile">✂️ 执行切割</button>
            </div>
        </div>

        <div id="right-panel">
            <div class="panel-header">
                <h2>预览 (上下拖拽鼠标/手指以移动片段)</h2>
            </div>
            <div id="preview-container">
                <canvas id="previewCanvas" width="800" height="800"></canvas>
            </div>
            <div class="control-bar action-bar">
                <button id="btn-reset" class="btn danger">🗑️ 重置</button>
                <button id="btn-rotate-z" class="btn secondary">🔄 旋转</button>
                <button id="btn-ligate" class="btn success">🔗 拼合</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h3 id="modal-title">实验提示</h3>
            <div id="modal-body"></div>
            <button id="modal-close" class="btn primary">我知道了</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
